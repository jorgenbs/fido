version: 2

builds:
  - main: .
    binary: fido
    ldflags:
      - -X github.com/jorgenbs/fido/internal/version.Version={{.Version}}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "fido_{{.Version}}_{{.Os}}_{{.Arch}}"

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

release:
  github:
    owner: jorgenbs
    name: fido
